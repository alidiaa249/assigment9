<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>crud</title>
    <link rel="stylesheet" href="css/all.min.css">
<link rel="stylesheet" href="css/bootstrap.min.css">
<link rel="stylesheet" href="css/style.css">
</head>

<body>
<div class="w-50 shadow-sm p-4 my-4 mx-auto mt-5 ">
  <h2 class="mb-3"> Product Management System</h2>
  <div class="form-floating mb-3">
  <input type="text" class="form-control" id="productname" placeholder="name@example.com">
  <label for="productname">product name</label>
</div>
<div class="form-floating mb-3">
  <input type="number" class="form-control" id="productprice" placeholder="Password">
  <label for="productprice">product price</label>
</div>
<div class="form-floating mb-3">
  <input type="text" class="form-control" id="productlist" placeholder="Password" list="list">
  <label for="productlist">product category</label>

  <datalist id="list">
  <option value="tv"></option>
  <option value="mobile"></option>
  <option value="screen"></option>
  <option value="watch"></option>

</datalist>
</div> 
<div class="form-floating mb-3 ">
  <textarea class="form-control" placeholder="Leave a comment here" id="productdescription"></textarea>
  <label for="productdescription">description</label>
</div>
<div class="mb-3">
  <label for="productimg" class="form-label">Default file input example</label>
  <input class="form-control" type="file" id="productimg">
</div>
<button onclick="addproduct()" class="btn btn-outline-primary " id="addbutton">Add Products</button>
<button class="btn btn-outline-success d-none" id="updatebutton" onclick="updateform()">update</button>



</div >
 <div class="form-floating mb-3 w-50 mx-auto">
  <input type="text" class="form-control" id="search" placeholder="name@example.com" oninput="search(this.value)">
  <label for="search">search</label>
</div>
<div class="w-75 mx-auto">
<table class="table mt-3" >
  <thead>
    <th>index</th>
    <th>image</th>
    <th>name</th>
    <th>price</th>
    <th>description</th>
    <th>category</th>
    <th>delete</th>
    <th>update</th>
  </thead>
<tbody id="table">

</tbody>

</table>

</div>































  <script src="js/bootstrap.bundle.min.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
